<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--[if mso]><style>table,td{font-family:Arial,sans-serif!important}</style><![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f5f4f0;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f4f0">
    <tr>
      <td align="center" style="padding:40px 16px">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%">

          <!-- Dark header with logo + brand name -->
          <tr>
            <td align="center" style="background-color:#0c0e1a;padding:36px 32px 28px;border-radius:12px 12px 0 0">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td valign="middle" style="padding-right:12px">
                    <img src="https://rewindtariffs.com/logo-full.png" alt="Rewind Tariffs" height="30" style="display:block;height:30px;width:auto" />
                  </td>
                  <td valign="middle">
                    <span style="font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.02em">Rewind Tariffs</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Main content -->
          <tr>
            <td style="background-color:#ffffff;padding:40px 36px 36px">
              <h1 style="font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:26px;font-weight:800;color:#1a1a2e;margin:0 0 16px;text-align:center;letter-spacing:-0.02em">
                Verify Your Email
              </h1>
              <p style="font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;line-height:1.6;color:#8a8780;margin:0 0 32px;text-align:center">
                Click the button below to complete your sign-up and continue with your free tariff refund assessment.
              </p>

              <!-- CTA Button with chamfered corners via inline SVG -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{ .ConfirmationURL }}" style="height:52px;v-text-anchor:middle;width:260px;" arcsize="0%" fillcolor="#f25650" stroke="f">
                      <w:anchorlock/>
                      <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">Verify &amp; continue &rarr;</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;text-decoration:none;position:relative">
                      <svg xmlns="http://www.w3.org/2000/svg" width="260" height="52" viewBox="0 0 260 52" style="display:block">
                        <path d="M12 0 L248 0 L260 12 L260 52 L12 52 L0 40 L0 0 Z" fill="#f25650"/>
                        <text x="130" y="31" text-anchor="middle" fill="#ffffff" font-family="'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" font-weight="600">Verify &amp; continue &#x2192;</text>
                      </svg>
                    </a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>

              <p style="font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.6;color:#8a8780;margin:28px 0 0;text-align:center">
                This link expires in 24 hours. If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#faf9f6;padding:20px 36px;border-top:1px solid #e8e6e1;border-radius:0 0 12px 12px;text-align:center">
              <p style="font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:12px;color:#8a8780;margin:0">
                &copy; 2026 Rewind Tariffs
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
